<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Chuka Cribs</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
    <link rel="stylesheet" href="css/admin-panel.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-brand">🏠 Chuka Cribs Admin</div>
        <div class="nav-right">
            <a href="/admin-dashboard.html" class="nav-link hidden" id="dashboardLink">Dashboard</a>
            <button class="logout-btn hidden" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <!-- Login Section -->
        <div class="login-section" id="loginSection">
            <div class="login-box">
                <h1 class="login-title">🔐 Admin Login</h1>
                <p class="login-subtitle">Enter your admin secret key to continue</p>
                <div id="loginAlert"></div>
                <div class="form-group">
                    <label for="secretKey">Admin Secret Key</label>
                    <input 
                        type="password" 
                        id="secretKey" 
                        placeholder="Enter secret key" 
                        required
                        autocomplete="off"
                    >
                </div>
                <button type="button" class="login-btn" id="loginSubmitBtn">Authenticate</button>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div class="dashboard-section" id="dashboardSection">
            <div class="dashboard-header">
                <h2>📋 Pending Properties</h2>
                <p>Review and approve property listings</p>
            </div>
            <div id="dashboardAlert"></div>
            <div class="properties-container">
                <div class="properties-grid" id="propertiesGrid"></div>
            </div>
        </div>
    </main>
    <!-- External Script - CSP Compliant -->
    <script src="js/admin-panel.js"></script>
</body>
</html>
