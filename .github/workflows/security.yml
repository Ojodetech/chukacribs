name: Security & Dependency Checks

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  push:
    paths:
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for vulnerable dependencies
        run: npm audit --json > audit-report.json || true

      - name: Parse audit report
        if: always()
        run: |
          echo "## Dependency Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          VULNERABILITIES=$(jq '.metadata.vulnerabilities' audit-report.json)
          CRITICAL=$(jq '.metadata.vulnerabilities.critical' audit-report.json)
          HIGH=$(jq '.metadata.vulnerabilities.high' audit-report.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate' audit-report.json)
          LOW=$(jq '.metadata.vulnerabilities.low' audit-report.json)
          
          echo "### Vulnerabilities Found: $VULNERABILITIES" >> $GITHUB_STEP_SUMMARY
          echo "- 🔴 Critical: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- 🟠 High: $HIGH" >> $GITHUB_STEP_SUMMARY
          echo "- 🟡 Moderate: $MODERATE" >> $GITHUB_STEP_SUMMARY
          echo "- 🔵 Low: $LOW" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "**Action Required**: Please review and fix vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo "Run \`npm audit fix\` or \`npm audit fix --force\` with caution" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No critical vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 30

      - name: Fail if critical vulnerabilities
        run: |
          CRITICAL=$(jq '.metadata.vulnerabilities.critical' audit-report.json)
          HIGH=$(jq '.metadata.vulnerabilities.high' audit-report.json)
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found"
            exit 1
          fi
          
          if [ "$HIGH" -gt 0 ]; then
            echo "⚠️ High severity vulnerabilities found"
            echo "Run 'npm audit' for details"
          fi

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit security --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

      - name: Run SAST with Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: true
        continue-on-error: true

      - name: Upload SAST results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif-file: semgrep.sarif
          category: semgrep
        continue-on-error: true

  license-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npm install -g license-checker
          license-checker --json > licenses.json
          license-checker --unknown --csv > licenses.csv
        continue-on-error: true

      - name: Upload license report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: license-report
          path: |
            licenses.json
            licenses.csv
          retention-days: 30

  dependency-updates:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Check for outdated dependencies
        run: |
          npm outdated --json > outdated.json || true
          npm outdated > outdated.txt || true

      - name: Parse outdated report
        if: always()
        run: |
          echo "## Dependency Update Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -s outdated.txt ]; then
            echo "### Updates Available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat outdated.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Recommendation**: Review and test dependency updates" >> $GITHUB_STEP_SUMMARY
            echo "Run \`npm update\` to upgrade to latest compatible versions" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All dependencies are up to date" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload outdated report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: dependency-report
          path: |
            outdated.json
            outdated.txt
          retention-days: 30

      - name: Create pull request for updates
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            if (fs.existsSync('outdated.txt') && fs.statSync('outdated.txt').size > 0) {
              const outdated = fs.readFileSync('outdated.txt', 'utf8');
              
              const prBody = `## Dependency Updates Available

\`\`\`
${outdated}
\`\`\`

### Action Items
- [ ] Review dependency changes
- [ ] Test for breaking changes
- [ ] Update package.json
- [ ] Verify all tests pass
- [ ] Merge after review

**Automated by**: GitHub Actions Security Workflow
**Date**: ${new Date().toISOString()}
`;
              
              // Optionally create a PR - requires additional setup
              console.log('Dependency updates available');
              console.log(outdated);
            }

  report-summary:
    needs: [ dependency-check, security-scan, license-check, dependency-updates ]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Generate security report
        run: |
          echo "## Security & Dependency Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Check: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- License Check: ${{ needs.license-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Updates: ${{ needs.dependency-updates.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recommendations" >> $GITHUB_STEP_SUMMARY
          echo "1. Review audit report artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Check for any vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "3. Update dependencies if needed" >> $GITHUB_STEP_SUMMARY
          echo "4. Verify license compliance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Run**: Daily at 2 AM UTC" >> $GITHUB_STEP_SUMMARY
