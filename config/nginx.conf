# Nginx Configuration for Load Balancing
# Chuka Cribs - Multiple Instance Load Distribution
# Location: /etc/nginx/sites-available/chuka-cribs or /etc/nginx/conf.d/chuka-cribs.conf

# Upstream backend servers
upstream chuka_cribs_backend {
  # Load balancing method: least_conn distributes to server with fewest connections
  least_conn;

  # Server instances (update IPs/ports as needed)
  server 127.0.0.1:3000 max_fails=2 fail_timeout=30s;
  server 127.0.0.1:3001 max_fails=2 fail_timeout=30s;
  server 127.0.0.1:3002 max_fails=2 fail_timeout=30s;
  server 127.0.0.1:3003 backup;

  # Health check configuration (requires nginx_http_upstream_module with health checks)
  # Enable: http://nginx.org/en/docs/http/ngx_http_upstream_hc_module.html
  # check interval=3000 rise=2 fall=5 timeout=1000 type=http;
  # check_http_send "GET /health/live HTTP/1.0\r\n\r\n";
  # check_http_expect_alive http_2xx http_3xx;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Redirect HTTP to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name chuka-cribs.com www.chuka-cribs.com;
  return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name chuka-cribs.com www.chuka-cribs.com;

  # SSL Configuration
  ssl_certificate /etc/ssl/certs/chuka-cribs.crt;
  ssl_certificate_key /etc/ssl/private/chuka-cribs.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # Logging
  access_log /var/log/nginx/chuka-cribs-access.log combined;
  error_log /var/log/nginx/chuka-cribs-error.log warn;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/xml text/javascript
             application/x-javascript application/xml+rss
             application/json;

  # Health check endpoints - no throttling
  location /health/ {
    access_log off;
    proxy_pass http://chuka_cribs_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 5s;
    proxy_read_timeout 5s;
  }

  # API routes with rate limiting
  location /api/ {
    # Rate limiting
    limit_req zone=api_limit burst=20 nodelay;

    # Proxy configuration
    proxy_pass http://chuka_cribs_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # Error handling
    proxy_intercept_errors on;
    error_page 502 503 504 /50x.html;
  }

  # Authentication endpoints with stricter rate limiting
  location /api/auth/ {
    limit_req zone=auth_limit burst=5 nodelay;
    
    proxy_pass http://chuka_cribs_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Static files - cache separately
  location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://chuka_cribs_backend;
    proxy_cache_valid 200 1d;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # WebSocket support for real-time features
  location /socket.io/ {
    proxy_pass http://chuka_cribs_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }

  # Default location
  location / {
    proxy_pass http://chuka_cribs_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Error pages
  error_page 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}

# Status endpoint (internal only)
server {
  listen 8080;
  listen [::]:8080;
  server_name localhost;

  location /nginx_status {
    stub_status on;
    access_log off;
    allow 127.0.0.1;
    allow ::1;
    deny all;
  }
}
