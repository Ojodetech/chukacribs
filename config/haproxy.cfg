# HAProxy Configuration for Load Balancing
# Chuka Cribs - Multiple Instance Load Distribution
# Location: /etc/haproxy/haproxy.cfg

global
  # Daemon mode
  daemon
  
  # Maximum connections
  maxconn 4096
  
  # Logging
  log 127.0.0.1 local0
  log 127.0.0.1 local1 notice
  
  # Default SSL material
  tune.ssl.default-dh-param 2048
  
  # Performance
  tune.bufsize 16384
  tune.maxconn 2000

defaults
  # Default modes
  mode http
  
  # Timeouts
  timeout connect 5000
  timeout client 50000
  timeout server 50000
  
  # Error handling
  errorfile 400 /etc/haproxy/errors/400.http
  errorfile 403 /etc/haproxy/errors/403.http
  errorfile 408 /etc/haproxy/errors/408.http
  errorfile 500 /etc/haproxy/errors/500.http
  errorfile 502 /etc/haproxy/errors/502.http
  errorfile 503 /etc/haproxy/errors/503.http
  errorfile 504 /etc/haproxy/errors/504.http

# Stats interface
listen stats
  bind 0.0.0.0:8404
  stats enable
  stats uri /stats
  stats refresh 30s
  stats show-legends
  stats show-node
  stats admin if TRUE

# Frontend for HTTP (redirect to HTTPS)
frontend http_front
  bind *:80
  mode http
  
  # Redirect HTTP to HTTPS
  redirect scheme https code 301 if !{ ssl_fc }

# Frontend for HTTPS
frontend https_front
  bind *:443 ssl crt /etc/ssl/certs/chuka-cribs.pem
  mode http
  
  # HTTP/2 support
  alpn h2,http/1.1
  
  # Compression
  compression algo gzip
  compression type text/plain text/css text/xml text/javascript \
                application/x-javascript application/xml+rss application/json
  
  # Logging
  log global
  option httplog
  option http-keep-alive
  
  # Security headers
  http-request set-header X-Forwarded-Proto https
  http-request set-header X-Forwarded-Port %[dst_port]
  
  # ACL definitions
  acl is_health path_beg /health/
  acl is_api path_beg /api/
  acl is_auth path_beg /api/auth/
  acl is_static path_end .jpg .jpeg .png .gif .css .js .ico .svg
  acl is_socket url_path_beg /socket.io/
  
  # Route based on ACLs
  use_backend health_backend if is_health
  use_backend auth_backend if is_auth
  use_backend static_backend if is_static
  use_backend socket_backend if is_socket
  use_backend api_backend if is_api
  default_backend main_backend

# Main backend - load balanced across multiple instances
backend main_backend
  mode http
  balance leastconn
  option forwardfor
  option httpchk GET /health/live HTTP/1.1\r\nHost:\ localhost
  
  # Health check parameters
  default-server inter 3s fall 3 rise 2
  
  # Backend servers with health checks
  server main1 127.0.0.1:3000 check weight 100
  server main2 127.0.0.1:3001 check weight 100
  server main3 127.0.0.1:3002 check weight 100
  server main4 127.0.0.1:3003 check weight 50 backup
  
  # Timeouts
  timeout connect 5s
  timeout server 30s
  
  # Session stickiness (if needed)
  # cookie SERVERID insert indirect nocache

# Health check backend - no throttling
backend health_backend
  mode http
  balance roundrobin
  option httpchk GET /health/live HTTP/1.1\r\nHost:\ localhost
  
  default-server inter 1s fall 2 rise 1
  
  server health1 127.0.0.1:3000 check weight 100
  server health2 127.0.0.1:3001 check weight 100
  server health3 127.0.0.1:3002 check weight 100
  server health4 127.0.0.1:3003 check weight 50
  
  # No caching for health checks
  http-reuse never
  timeout server 5s

# API backend with rate limiting
backend api_backend
  mode http
  balance leastconn
  option forwardfor
  option httpchk GET /health/live HTTP/1.1\r\nHost:\ localhost
  
  default-server inter 3s fall 3 rise 2
  
  server api1 127.0.0.1:3000 check weight 100
  server api2 127.0.0.1:3001 check weight 100
  server api3 127.0.0.1:3002 check weight 100
  server api4 127.0.0.1:3003 check weight 50 backup
  
  # Request limiting
  rate-limit sessions 10000
  
  # Timeout
  timeout server 30s

# Auth backend with stricter limits
backend auth_backend
  mode http
  balance roundrobin
  option forwardfor
  
  default-server inter 3s fall 3 rise 2
  
  server auth1 127.0.0.1:3000 check weight 100
  server auth2 127.0.0.1:3001 check weight 100
  server auth3 127.0.0.1:3002 check weight 100
  
  # Stricter rate limiting for auth
  rate-limit sessions 1000
  
  timeout server 30s

# Static files backend (can use separate servers or cdn)
backend static_backend
  mode http
  balance roundrobin
  
  # Can be pointed to CDN instead
  server static1 127.0.0.1:3000 check
  server static2 127.0.0.1:3001 check
  server static3 127.0.0.1:3002 check
  
  # Longer timeout for downloads
  timeout server 60s
  
  # Cache headers
  http-response set-header Cache-Control "public, max-age=86400"

# WebSocket backend
backend socket_backend
  mode http
  balance roundrobin
  option forwardfor
  
  default-server inter 3s fall 3 rise 2
  
  server socket1 127.0.0.1:3000 check weight 100
  server socket2 127.0.0.1:3001 check weight 100
  server socket3 127.0.0.1:3002 check weight 100
  
  # Long timeout for WebSocket
  timeout server 3600s
  timeout tunnel 3600s
