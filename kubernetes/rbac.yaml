---
# ServiceAccount for the application
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chuka-cribs
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
---
# Role for application-specific permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chuka-cribs
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
rules:
  # ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  
  # Secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  
  # Services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  
  # Pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  
  # Pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  
  # Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  
  # StatefulSets
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch"]
  
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
# RoleBinding for the application
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chuka-cribs
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chuka-cribs
subjects:
  - kind: ServiceAccount
    name: chuka-cribs
    namespace: chuka-cribs
---
# ClusterRole for monitoring and observability
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chuka-cribs-monitoring
  labels:
    app: chuka-cribs
rules:
  # Nodes (for monitoring)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  
  # PersistentVolumes
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  
  # Namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  
  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
# ClusterRoleBinding for monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chuka-cribs-monitoring
  labels:
    app: chuka-cribs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chuka-cribs-monitoring
subjects:
  - kind: ServiceAccount
    name: chuka-cribs
    namespace: chuka-cribs
