apiVersion: v1
kind: Secret
metadata:
  name: chuka-cribs-secrets
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
    component: secrets
type: Opaque
stringData:
  # Database Credentials
  MONGODB_USERNAME: "chuka-user"
  MONGODB_PASSWORD: "your-secure-password-here"
  MONGODB_URI: "mongodb://chuka-user:your-secure-password-here@mongodb:27017/chuka-cribs?replicaSet=chuka-cribs-rs&authSource=admin"
  
  # Redis Configuration
  REDIS_PASSWORD: "your-redis-password-here"
  
  # JWT Secrets
  JWT_SECRET: "your-jwt-secret-key-here-min-32-chars"
  REFRESH_TOKEN_SECRET: "your-refresh-token-secret-here"
  
  # Email Configuration
  SMTP_USERNAME: "your-email@gmail.com"
  SMTP_PASSWORD: "your-app-specific-password"
  MAILGUN_API_KEY: "key-xxxxxxxxxxxxxxxxxxxx"
  MAILGUN_DOMAIN: "mg.chukacribs.co.ke"
  
  # Payment Gateway Credentials
  PESAPAL_API_KEY: "your-pesapal-api-key"
  PESAPAL_API_SECRET: "your-pesapal-api-secret"
  PESAPAL_CONSUMER_KEY: "your-pesapal-consumer-key"
  PESAPAL_CONSUMER_SECRET: "your-pesapal-consumer-secret"
  
  # OpenSMS Integration
  OPENSMS_API_KEY: "your-opensms-api-key"
  OPENSMS_API_SECRET: "your-opensms-api-secret"
  
  # AWS S3 Configuration (for file uploads)
  AWS_ACCESS_KEY_ID: "your-aws-access-key"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-key"
  AWS_S3_BUCKET: "chuka-cribs-uploads"
  AWS_S3_REGION: "eu-west-1"
  
  # Google Analytics
  GOOGLE_ANALYTICS_ID: "UA-xxxxxxxxx-x"
  
  # Admin Credentials (first admin user)
  ADMIN_EMAIL: "admin@chukacribs.co.ke"
  ADMIN_PASSWORD: "generate-strong-password"
  
  # Sentry Error Tracking
  SENTRY_DSN: "https://xxxxxxxxxxxxxxxxxxxx@xxxx.ingest.sentry.io/xxxx"
  
  # Slack Notifications
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/YOUR/HOOK/URL"
  
  # Docker Registry Credentials (base64 encoded)
  DOCKER_REGISTRY_PASSWORD: "your-docker-registry-password"
  
  # API Keys for External Services
  GOOGLE_MAPS_API_KEY: "your-google-maps-api-key"
  GOOGLE_PLACES_API_KEY: "your-google-places-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: chuka-cribs-docker-registry
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
type: kubernetes.io/dockercfg
stringData:
  .dockercfg: |
    {
      "ghcr.io": {
        "email": "your-email@example.com",
        "auth": "base64-encoded-credentials"
      }
    }
