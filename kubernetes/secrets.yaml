apiVersion: v1
kind: Secret
metadata:
  name: chuka-cribs-secrets
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
    component: secrets
type: Opaque
stringData:
  # Database
  MONGODB_URI: "mongodb://user:password@mongodb:27017/chuka_cribs?authSource=admin"
  
  # Redis
  REDIS_URL: "redis://:password@redis:6379/0"
  
  # JWT & Authentication (CHANGE THESE IN PRODUCTION)
  JWT_SECRET: "your-jwt-secret-key-change-in-production-min-32-characters-here"
  ADMIN_SECRET_KEY: "your-admin-secret-key-change-in-production-min-16-chars"
  
  # Email Configuration
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SENDER_EMAIL: "noreply@chukacribs.com"
  SENDER_PASSWORD: "your-email-app-password-here"
  
  # SMS Configuration
  SMS_API_KEY: "your-sms-api-key-here"
  SMS_API_URL: "https://api.sms-provider.com"
  SMS_SENDER_ID: "CHUKACRIBS"
  OPENSMS_API_KEY: "your-opensms-api-key-here"
  
  # Payment Integration
  MPESA_API_KEY: "your-mpesa-api-key-here"
  MPESA_BUSINESS_SHORTCODE: "123456"
  MPESA_CONSUMER_KEY: "your-mpesa-consumer-key"
  MPESA_CONSUMER_SECRET: "your-mpesa-consumer-secret"
  MPESA_PASSKEY: "your-mpesa-passkey-here"
  
  PESAPAL_API_KEY: "your-pesapal-api-key-here"
  PESAPAL_SECRET_KEY: "your-pesapal-secret-key-here"
  PESAPAL_CONSUMER_KEY: "your-pesapal-consumer-key"
  PESAPAL_CONSUMER_SECRET: "your-pesapal-consumer-secret"
  
  # Error Tracking
  SENTRY_DSN: "https://xxxxx@sentry.io/123456"
  
  # Slack Notifications (Optional)
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/xxxxx/xxxxx/xxxxx"
  
  # SSL/TLS
  HTTPS_ENABLED: "true"
  SSL_CERT_PATH: "/etc/secrets/tls/tls.crt"
  SSL_KEY_PATH: "/etc/secrets/tls/tls.key"
  
---
apiVersion: v1
kind: Secret
metadata:
  name: chuka-cribs-tls
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
    component: tls
type: kubernetes.io/tls
data:
  # These should be base64 encoded:
  # echo -n "certificate content" | base64 -w 0
  tls.crt: LS0tLS1CRUdJTi... # Base64 encoded certificate
  tls.key: LS0tLS1CRUdJTi... # Base64 encoded private key
---
apiVersion: v1
kind: Secret
metadata:
  name: chuka-cribs-docker-registry
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
    component: docker
type: kubernetes.io/dockercfg
