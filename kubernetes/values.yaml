# Chuka Cribs - Helm Values
# Customize these values for your deployment

replicaCount: 3

image:
  repository: ghcr.io/your-org/chuka-cribs
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: chuka-cribs-docker-registry

nameOverride: ""
fullnameOverride: "chuka-cribs"

serviceAccount:
  create: true
  annotations: {}
  name: "chuka-cribs"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  fsGroup: 1001

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: chukacribs.co.ke
      paths:
        - path: /
          pathType: Prefix
    - host: www.chukacribs.co.ke
      paths:
        - path: /
          pathType: Prefix
    - host: api.chukacribs.co.ke
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: chuka-cribs-tls
      hosts:
        - chukacribs.co.ke
        - www.chukacribs.co.ke
        - api.chukacribs.co.ke

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - chuka-cribs
          topologyKey: kubernetes.io/hostname

livenessProbe:
  httpGet:
    path: /api/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 2

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 30

# Application Configuration
config:
  NODE_ENV: production
  PORT: 3000
  HOSTNAME: 0.0.0.0
  LOG_LEVEL: info
  
  # Database
  MONGODB_HOST: mongodb
  MONGODB_PORT: 27017
  MONGODB_REPLICA_SET: chuka-cribs-rs
  
  # Redis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  
  # Features
  FEATURE_EMAIL_VERIFICATION: "true"
  FEATURE_PAYMENT_GATEWAY: "true"
  FEATURE_ADMIN_PANEL: "true"

# Secrets (these should be provided at deploy time)
secrets:
  mongodb:
    username: chuka-user
    password: ""  # Provide at deploy time
    database: chuka-cribs
  
  redis:
    password: ""  # Provide at deploy time
  
  jwt:
    secret: ""  # Provide at deploy time
    refreshSecret: ""  # Provide at deploy time
  
  email:
    host: smtp.gmail.com
    port: 587
    username: ""  # Provide at deploy time
    password: ""  # Provide at deploy time
  
  payment:
    pesapal:
      apiKey: ""  # Provide at deploy time
      apiSecret: ""  # Provide at deploy time
    opensms:
      apiKey: ""  # Provide at deploy time
      apiSecret: ""  # Provide at deploy time

# MongoDB Configuration
mongodb:
  enabled: true
  auth:
    enabled: true
    username: chuka-user
    password: ""  # Provide at deploy time
    database: chuka-cribs
  persistence:
    enabled: true
    storageClass: standard
    size: 20Gi
  resources:
    limits:
      memory: 1Gi
      cpu: 500m
    requests:
      memory: 512Mi
      cpu: 250m

# Redis Configuration
redis:
  enabled: true
  auth:
    enabled: true
    password: ""  # Provide at deploy time
  persistence:
    enabled: true
    storageClass: standard
    size: 10Gi
  resources:
    limits:
      memory: 512Mi
      cpu: 250m
    requests:
      memory: 256Mi
      cpu: 100m

# Monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true

# Network Policy
networkPolicy:
  enabled: true

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Volume Mounts
volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: logs
    mountPath: /app/logs
  - name: cache
    mountPath: /app/.cache

volumes:
  - name: tmp
    emptyDir: {}
  - name: logs
    emptyDir: {}
  - name: cache
    emptyDir: {}
