apiVersion: v1
kind: Service
metadata:
  name: chuka-cribs-metrics
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
    component: monitoring
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: chuka-cribs
    component: api
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chuka-cribs
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
    component: monitoring
spec:
  selector:
    matchLabels:
      app: chuka-cribs
      component: monitoring
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: chuka-cribs-alerts
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
spec:
  groups:
    - name: chuka-cribs
      interval: 30s
      rules:
        # Pod availability alerts
        - alert: ChukaCribsPodDown
          expr: count(up{job="chuka-cribs"} == 0) > 0
          for: 5m
          labels:
            severity: critical
            team: backend
          annotations:
            summary: "Chuka Cribs pod is down"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is down."

        # High CPU usage alert
        - alert: ChukaCribsHighCPU
          expr: rate(container_cpu_usage_seconds_total{pod=~"chuka-cribs-.*"}[5m]) > 0.8
          for: 5m
          labels:
            severity: warning
            team: backend
          annotations:
            summary: "Chuka Cribs high CPU usage"
            description: "Pod {{ $labels.pod }} CPU usage is {{ $value }}%"

        # High memory usage alert
        - alert: ChukaCribsHighMemory
          expr: container_memory_usage_bytes{pod=~"chuka-cribs-.*"} / container_spec_memory_limit_bytes > 0.9
          for: 5m
          labels:
            severity: warning
            team: backend
          annotations:
            summary: "Chuka Cribs high memory usage"
            description: "Pod {{ $labels.pod }} memory usage is {{ $value }}%"

        # Request latency alert
        - alert: ChukaCribsHighLatency
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="chuka-cribs"}[5m])) > 1
          for: 5m
          labels:
            severity: warning
            team: backend
          annotations:
            summary: "Chuka Cribs high request latency"
            description: "95th percentile latency is {{ $value }}s"

        # Error rate alert
        - alert: ChukaCribsHighErrorRate
          expr: rate(http_requests_total{job="chuka-cribs",status=~"5.."}[5m]) > 0.05
          for: 5m
          labels:
            severity: critical
            team: backend
          annotations:
            summary: "Chuka Cribs high error rate"
            description: "Error rate is {{ $value | humanizePercentage }}"

        # Database connection alert
        - alert: ChukaCribsDBConnError
          expr: increase(mongodb_connection_errors_total{job="chuka-cribs"}[5m]) > 0
          for: 2m
          labels:
            severity: critical
            team: database
          annotations:
            summary: "Database connection error"
            description: "{{ $value }} database errors in the last 5 minutes"

        # Redis connection alert
        - alert: ChukaCribsRedisConnError
          expr: increase(redis_connection_errors_total{job="chuka-cribs"}[5m]) > 0
          for: 2m
          labels:
            severity: critical
            team: cache
          annotations:
            summary: "Redis connection error"
            description: "{{ $value }} Redis errors in the last 5 minutes"

        # Disk usage alert
        - alert: ChukaCribsHighDiskUsage
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85
          for: 5m
          labels:
            severity: warning
            team: infrastructure
          annotations:
            summary: "High disk usage on {{ $labels.persistentvolumeclaim }}"
            description: "Disk usage is {{ $value | humanizePercentage }}"

        # Pod restart alert
        - alert: ChukaCribsPodRestarting
          expr: rate(kube_pod_container_status_restarts_total{pod=~"chuka-cribs-.*"}[1h]) > 0.1
          for: 10m
          labels:
            severity: warning
            team: backend
          annotations:
            summary: "Pod is restarting frequently"
            description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last hour"
