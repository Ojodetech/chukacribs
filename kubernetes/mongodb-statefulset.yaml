apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-config
  namespace: chuka-cribs
  labels:
    app: mongodb
    component: config
data:
  mongod.conf: |
    storage:
      dbPath: /data/db
      journal:
        enabled: true
    replication:
      replSetName: chuka-cribs-rs
    net:
      bindIp: 0.0.0.0
      port: 27017
    security:
      authorization: enabled
    operationProfiling:
      mode: slowOp
      slowOpThresholdMs: 100
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: chuka-cribs
  labels:
    app: mongodb
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "admin"
  MONGO_INITDB_ROOT_PASSWORD: "your-mongodb-admin-password"
  MONGO_INITDB_DATABASE: "chuka-cribs"
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: chuka-cribs
  labels:
    app: mongodb
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
      name: mongodb
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: chuka-cribs
  labels:
    app: mongodb
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
      name: mongodb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: chuka-cribs
  labels:
    app: mongodb
    component: database
spec:
  serviceName: mongodb
  replicas: 3
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999
      containers:
        - name: mongodb
          image: mongo:6.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
              name: mongodb
          
          envFrom:
            - secretRef:
                name: mongodb-secret
          
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: config
              mountPath: /etc/mongod.conf
              subPath: mongod.conf
          
          livenessProbe:
            exec:
              command:
                - mongo
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            exec:
              command:
                - mongo
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
          
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    if [ "$HOSTNAME" == "mongodb-0" ]; then
                      sleep 10
                      mongo --eval "
                        rs.initiate({
                          _id: 'chuka-cribs-rs',
                          members: [
                            {_id: 0, host: 'mongodb-0.mongodb:27017'},
                            {_id: 1, host: 'mongodb-1.mongodb:27017'},
                            {_id: 2, host: 'mongodb-2.mongodb:27017'}
                          ]
                        })
                      " || true
                    fi
  
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 20Gi
