apiVersion: v1
kind: Namespace
metadata:
  name: chuka-cribs
  labels:
    name: chuka-cribs
    environment: production
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chuka-cribs
  namespace: chuka-cribs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chuka-cribs
  namespace: chuka-cribs
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chuka-cribs
  namespace: chuka-cribs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chuka-cribs
subjects:
  - kind: ServiceAccount
    name: chuka-cribs
    namespace: chuka-cribs
---
apiVersion: v1
kind: NetworkPolicy
metadata:
  name: chuka-cribs-network-policy
  namespace: chuka-cribs
spec:
  podSelector:
    matchLabels:
      app: chuka-cribs
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
