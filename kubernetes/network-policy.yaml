apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chuka-cribs-network-policy
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
spec:
  podSelector:
    matchLabels:
      app: chuka-cribs
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - podSelector:
            matchLabels:
              app: chuka-cribs
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    
    # Allow MongoDB
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    
    # Allow external HTTPS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    
    # Allow external HTTP
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 80
    
    # Allow SMTP
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 587
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chuka-cribs-pdb
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: chuka-cribs
      component: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mongodb-pdb
  namespace: chuka-cribs
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: mongodb
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-pdb
  namespace: chuka-cribs
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: redis
