apiVersion: v1
kind: Service
metadata:
  name: chuka-cribs
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
    component: api
spec:
  type: ClusterIP
  selector:
    app: chuka-cribs
    component: api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: chuka-cribs-headless
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
    component: api
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: chuka-cribs
    component: api
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: chuka-cribs-nodeport
  namespace: chuka-cribs
  labels:
    app: chuka-cribs
    component: api
spec:
  type: NodePort
  selector:
    app: chuka-cribs
    component: api
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30000
      protocol: TCP
